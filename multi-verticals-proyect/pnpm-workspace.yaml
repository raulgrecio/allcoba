packages:
  - 'packages/*'
  - 'services/*'
  - 'apps/*'

allowBuilds:
  cpu-features: set this to true or false
  esbuild: set this to true or false
  msw: set this to true or false
  protobufjs: set this to true or false
  sharp: set this to true or false
  ssh2: set this to true or false
  tesseract.js: set this to true or false
  unrs-resolver: set this to true or false

# Disable pnpm 11 auto-rerun of `install` before every script — it would
# re-emit ERR_PNPM_IGNORED_BUILDS and crash turbo. We trust the lockfile.
verifyDepsBeforeRun: false
