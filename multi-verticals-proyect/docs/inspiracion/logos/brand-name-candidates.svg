<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <linearGradient id="zeen-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333EA"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="nevo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <linearGradient id="kova-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899"/>
      <stop offset="100%" style="stop-color:#F97316"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700&amp;display=swap');
      text { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="600" height="300" fill="#ffffff"/>

  <!-- Dividers -->
  <line x1="200" y1="40" x2="200" y2="260" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="400" y1="40" x2="400" y2="260" stroke="#f0f0f0" stroke-width="1"/>

  <!-- ── ZEEN ── -->
  <!-- Icon -->
  <rect x="70" y="70" width="60" height="60" rx="18" fill="url(#zeen-grad)"/>
  <text x="100" y="115" text-anchor="middle" font-size="32" font-weight="700" fill="white">Z</text>
  <!-- Wordmark -->
  <text x="100" y="175" text-anchor="middle" font-size="36" font-weight="700" fill="url(#zeen-grad)" letter-spacing="-1">zeen</text>
  <!-- Dot -->
  <circle cx="136" cy="162" r="4" fill="url(#zeen-grad)"/>
  <!-- Label -->
  <text x="100" y="210" text-anchor="middle" font-size="11" fill="#aaaaaa" font-weight="500">OPCIÓN 1 · Principal</text>
  <!-- Domain -->
  <text x="100" y="228" text-anchor="middle" font-size="10" fill="#cccccc" font-family="monospace">zeen.app</text>

  <!-- ── NEVO ── -->
  <!-- Icon -->
  <rect x="270" y="70" width="60" height="60" rx="18" fill="url(#nevo-grad)"/>
  <text x="300" y="115" text-anchor="middle" font-size="32" font-weight="700" fill="white">N</text>
  <!-- Wordmark: ne + V accent + o -->
  <text x="268" y="175" font-size="36" font-weight="700" fill="#1a1a1e" letter-spacing="-1">ne</text>
  <text x="306" y="175" font-size="36" font-weight="700" fill="url(#nevo-grad)" letter-spacing="-1">v</text>
  <text x="326" y="175" font-size="36" font-weight="700" fill="#1a1a1e" letter-spacing="-1">o</text>
  <!-- Label -->
  <text x="300" y="210" text-anchor="middle" font-size="11" fill="#aaaaaa" font-weight="500">OPCIÓN 2 · Reserva</text>
  <text x="300" y="228" text-anchor="middle" font-size="10" fill="#cccccc" font-family="monospace">nevo.app</text>

  <!-- ── KOVA ── -->
  <!-- Icon -->
  <rect x="470" y="70" width="60" height="60" rx="18" fill="url(#kova-grad)"/>
  <text x="500" y="115" text-anchor="middle" font-size="32" font-weight="700" fill="white">K</text>
  <!-- Wordmark: K accent + ova -->
  <text x="466" y="175" font-size="36" font-weight="700" fill="url(#kova-grad)" letter-spacing="-1">K</text>
  <text x="491" y="175" font-size="36" font-weight="700" fill="#1a1a1e" letter-spacing="-1">ova</text>
  <!-- Label -->
  <text x="500" y="210" text-anchor="middle" font-size="11" fill="#aaaaaa" font-weight="500">OPCIÓN 3 · Reserva</text>
  <text x="500" y="228" text-anchor="middle" font-size="10" fill="#cccccc" font-family="monospace">kova.app</text>

</svg>
